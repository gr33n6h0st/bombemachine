<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bombe Model G: Smart Search Edition</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Special+Elite&family=Fira+Code:wght@400&display=swap');
        :root { --bakelite: #1a1a1a; --brass: #b08d57; }
        body { background: #080808; color: #ddd; font-family: 'Special Elite', serif; display: flex; flex-direction: column; align-items: center; padding: 15px; margin: 0; }
        .chassis { background: #1a1a1a; border: 10px solid #000; padding: 25px; width: 95vw; max-width: 1100px; box-shadow: 0 50px 100px #000; border-radius: 4px; }
        .header { text-align: center; color: var(--brass); letter-spacing: 4px; border-bottom: 2px solid #333; padding-bottom: 10px; text-transform: uppercase; margin: 0 0 20px 0; }

        .rack { display: grid; grid-template-columns: repeat(12, 1fr); gap: 10px; background: #000; padding: 20px; margin-bottom: 25px; border: 2px solid #222; }
        .drum {
            width: 60px; height: 60px; border-radius: 50%;
            background: radial-gradient(circle, #444 0%, #111 60%, #000 100%);
            border: 4px solid #333; position: relative;
            display: flex; align-items: center; justify-content: center;
        }
        .drum::after {
            content: "A . C . E . G . I . K . M . O . Q . S . U . W . Y .";
            position: absolute; width: 100%; height: 100%; font-size: 7px; color: rgba(255,255,255,0.4);
            display: flex; align-items: center; justify-content: center; text-align: center;
        }
        .active-letter { font-size: 24px; color: #fff; font-weight: bold; z-index: 5; pointer-events: none; }
        .center-hub { width: 14px; height: 14px; background: var(--brass); border-radius: 50%; position: absolute; z-index: 4; border: 1px solid #000; }

        .panel-grid { display: grid; grid-template-columns: 1fr 1.5fr 1fr; gap: 20px; }
        .sub-panel { background: #0f0f0f; border: 1px solid #333; padding: 15px; border-radius: 4px; }
        .label { font-size: 10px; color: #666; text-transform: uppercase; margin-bottom: 8px; }
        input, select { background: #000; color: #00ff41; border: 1px solid #444; padding: 10px; font-family: 'Fira Code'; font-size: 13px; width: 90%; margin-bottom: 12px; }
        .screen { background: #000b00; color: #00ff41; height: 140px; font-family: 'Fira Code'; font-size: 11px; padding: 10px; overflow-y: auto; border: 1px solid #002200; border-radius: 4px; }
        button { background: #4a0000; color: white; border: 3px solid #000; padding: 18px; cursor: pointer; font-family: 'Special Elite'; width: 100%; font-size: 18px; }
        .odo { font-size: 38px; color: var(--brass); background: #000; text-align: center; letter-spacing: 8px; border: 1px solid #333; margin-bottom: 10px; }
        .lamp { width: 40px; height: 40px; border-radius: 50%; background: #200; border: 3px solid #000; margin: 10px auto; }
        .lamp.hit { background: radial-gradient(circle, #f00, #400); box-shadow: 0 0 30px #f00; border-color: #ffcccc; }
    </style>
</head>
<body onload="init()">

    <div class="chassis">
        <h1 class="header">Bombe Model G: Smart Search</h1>
        <div class="rack" id="rack"></div>

        <div class="panel-grid">
            <div class="sub-panel">
                <div class="label">Hardware Setup</div>
                <select id="rotor-select">
                    <option value="0,1,2">I - II - III</option>
                    <option value="1,0,2">II - I - III</option>
                    <option value="2,1,0">III - II - I</option>
                    <option value="3,1,4">IV - II - V</option>
                </select>
                <div class="label">Ciphertext</div>
                <input type="text" id="cipher-in" placeholder="PASTE CIPHER...">
                <div class="label">Crib (Any word in the msg)</div>
                <input type="text" id="crib-in" placeholder="e.g., WEATHER">
            </div>

            <div class="sub-panel">
                <div class="label">Logic Monitor</div>
                <div class="screen" id="log">> STANDBY... READY TO SCAN</div>
                <div style="font-size:9px; color:var(--brass); margin-top:10px;">* MACHINE WILL AUTO-ALIGN CRIB TO CIPHER</div>
            </div>

            <div class="sub-panel" style="text-align:center;">
                <div class="odo" id="odo">AAA</div>
                <div class="lamp" id="stop-lamp"></div>
                <button id="run-btn" onclick="toggleBombe()">RUN MOTOR</button>
            </div>
        </div>
    </div>

<script>
    const alpha = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
    let isRunning = false, p = [0, 0, 0];
    
    // AUTHENTIC WIRING
    const rotors = ["EKMFLGDQVZNTOWYHXUSPAIBRCJ", "AJDKSIRUXBLHWTMCQGZNPYFVOE", "BDFHJLCPRTXVZNYEIWGAKMUSQO", "ESOVPZJAYQUIRHXLNFTGKDCMWB", "VZBRGITYUPSDNHLXAWMJQOFECK"];
    const reflector = "YRUHQSLDPXNGOKMIEBFZCWVJAT";

    function init() {
        const rack = document.getElementById('rack');
        for (let i = 0; i < 36; i++) {
            rack.innerHTML += `<div class="drum-unit"><div class="drum" id="d-${i}"><div class="center-hub"></div><div class="active-letter">A</div></div></div>`;
        }
    }

    function enigmaMap(char, pos, rSet) {
        let c = alpha.indexOf(char);
        for(let i=2; i>=0; i--) {
            let shift = pos[i];
            c = (alpha.indexOf(rotors[rSet[i]][(c + shift + 26) % 26]) - shift + 26) % 26;
        }
        c = alpha.indexOf(reflector[c]);
        for(let i=0; i<3; i++) {
            let shift = pos[i];
            let target = alpha[(c + shift + 26) % 26];
            c = (rotors[rSet[i]].indexOf(target) - shift + 26) % 26;
        }
        return alpha[c];
    }

    function toggleBombe() {
        isRunning = !isRunning;
        document.getElementById('run-btn').innerText = isRunning ? "STOP MOTOR" : "RUN MOTOR";
        if(isRunning) {
            document.getElementById('stop-lamp').classList.remove('hit');
            document.getElementById('log').innerHTML = "> STARTING SMART SCAN...<br>" + document.getElementById('log').innerHTML;
            scan();
        }
    }

    function scan() {
        if(!isRunning) return;
        const cipher = document.getElementById('cipher-in').value.toUpperCase().replace(/[^A-Z]/g, "");
        const crib = document.getElementById('crib-in').value.toUpperCase().replace(/[^A-Z]/g, "");
        const rSet = document.getElementById('rotor-select').value.split(',').map(Number);
        
        if(!cipher || !crib) { isRunning = false; return; }

        let found = false;
        // THE SMART SCAN: Check every possible offset for the crib (up to 15 chars in)
        for (let offset = 0; offset < Math.min(cipher.length - crib.length + 1, 15); offset++) {
            let match = true;
            for(let i = 0; i < crib.length; i++) {
                let currentStep = [...p];
                currentStep[2] = (currentStep[2] + offset + i) % 26; // Account for rotor turn
                if(enigmaMap(crib[i], currentStep, rSet) !== cipher[offset + i]) {
                    match = false;
                    break;
                }
            }
            if(match) { found = true; break; }
        }

        if(found) {
            document.getElementById('stop-lamp').classList.add('hit');
            document.getElementById('log').innerHTML = `<span style="color:yellow">*** HIT DETECTED AT ${p.map(x=>alpha[x]).join("")} ***</span><br>` + document.getElementById('log').innerHTML;
            isRunning = false;
        } else {
            p[2]++;
            if(p[2] >= 26) { p[2] = 0; p[1]++; }
            if(p[1] >= 26) { p[1] = 0; p[0]++; }
            if(p[0] >= 26) { isRunning = false; return; }
            updateVisuals();
            setTimeout(scan, 1);
        }
    }

    function updateVisuals() {
        document.getElementById('odo').innerText = p.map(x => alpha[x]).join("");
        for(let i=0; i<12; i++) {
            let rot = p[i % 3] * (360/26);
            let d = document.getElementById(`d-${i}`);
            if(d) d.style.transform = `rotate(${rot}deg)`;
        }
    }
</script>
</body>
</html>
