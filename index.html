<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bletchley Park: Bombe Reconstruction</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Special+Elite&family=Fira+Code:wght@400&display=swap');
        :root { --bakelite: #1a1a1a; --brass: #b08d57; --rim: #e0e0e0; }
        body { background: #050505; color: #ddd; font-family: 'Special Elite', serif; display: flex; flex-direction: column; align-items: center; padding: 10px; margin: 0; }
        
        .chassis { 
            background: linear-gradient(145deg, #1d1d1d, #0a0a0a); 
            border: 10px solid #000; border-radius: 4px; padding: 20px; 
            width: 95vw; max-width: 1000px; box-shadow: 0 40px 80px #000;
        }

        .header { text-align: center; color: var(--brass); letter-spacing: 4px; margin: 0 0 15px 0; border-bottom: 1px solid #333; padding-bottom: 5px; text-transform: uppercase; font-size: 20px; }
        
        /* THE ROTOR BANK GRID */
        .rack { 
            display: grid; grid-template-columns: repeat(9, 1fr); gap: 8px; 
            background: #000; padding: 15px; margin-bottom: 20px; border: 2px solid #222; 
        }

        .drum-unit { display: flex; flex-direction: column; align-items: center; }

        .drum {
            width: 55px; height: 55px; border-radius: 50%;
            background: radial-gradient(circle, #333 0%, var(--bakelite) 60%, #000 100%);
            border: 3px solid #000; position: relative;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 8px #000; transform: rotate(0deg);
        }

        /* The Alphabet Ring (Skeuomorphic) */
        .drum::before {
            content: ""; position: absolute; width: 90%; height: 90%;
            border: 1px dashed rgba(255,255,255,0.2); border-radius: 50%;
        }

        .drum-text { 
            font-size: 8px; color: var(--rim); position: absolute; width: 100%; height: 100%;
            text-align: center; pointer-events: none;
        }

        .active-letter { font-size: 18px; color: #fff; font-weight: bold; z-index: 5; text-shadow: 0 0 4px #000; }

        /* PANELS */
        .panel-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .sub-panel { background: #0f0f0f; border: 1px solid #333; padding: 15px; border-radius: 2px; }
        .label { font-size: 10px; color: #666; text-transform: uppercase; margin-bottom: 5px; }
        
        input { background: #000; color: #00ff41; border: 1px solid #444; padding: 8px; font-family: 'Fira Code'; font-size: 13px; width: 90%; margin-bottom: 10px; }
        
        .screen { background: #000b00; color: #00ff41; height: 120px; font-family: 'Fira Code'; font-size: 11px; padding: 8px; overflow-y: auto; border: 1px solid #002200; border-radius: 4px; }
        
        button { background: #3d0a0a; color: #fff; border: 2px solid #000; padding: 15px; cursor: pointer; font-family: 'Special Elite'; font-weight: bold; width: 100%; transition: 0.2s; }
        button:hover { background: #611010; }

        .lamp-box { display: flex; flex-direction: column; align-items: center; gap: 5px; }
        .lamp { width: 30px; height: 30px; border-radius: 50%; background: #200; border: 2px solid #000; transition: 0.3s; }
        .lamp.hit { background: radial-gradient(circle, #f00, #400); box-shadow: 0 0 20px #f00; }
        .odo { font-size: 32px; color: var(--brass); background: #000; padding: 5px 15px; border: 1px solid #333; text-align: center; margin: 10px 0; letter-spacing: 5px; }

        .instructor-panel { margin-top: 15px; padding: 10px; border: 1px dashed #444; font-size: 11px; }
    </style>
</head>
<body onload="init()">

    <div class="chassis">
        <h1 class="header">Welchman-Turing Bombe: High-Speed Scrambler</h1>
        <div class="rack" id="rack"></div>

        <div class="panel-grid">
            <div class="sub-panel">
                <div class="label">Incoming Intercept (Ciphertext)</div>
                <input type="text" id="cipher-in" value="LVBHTYAIGY">
                <div class="label">Confirmed Crib (English)</div>
                <input type="text" id="crib-in" value="WORLD">
                
                <div class="instructor-panel">
                    <div class="label" style="color:#800">Master Key (The True Rotor Setting)</div>
                    <input type="text" id="secret-key" value="DPG" maxlength="3" style="width:50px; text-align:center; color:white; border-color:#800;">
                </div>
            </div>

            <div class="sub-panel">
                <div class="screen" id="log">> SYSTEM STANDBY...</div>
                <div style="display:flex; justify-content:space-between; align-items:center; margin-top:10px;">
                    <div class="odo" id="odo">AAA</div>
                    <div class="lamp-box">
                        <div class="lamp" id="stop-lamp"></div>
                        <div class="label">STOP</div>
                    </div>
                </div>
                <button id="run-btn" onclick="toggleBombe()">START SEARCH</button>
            </div>
        </div>
    </div>

<script>
    const alpha = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
    let isRunning = false, p = [0, 0, 0];
    
    function init() {
        const rack = document.getElementById('rack');
        // Organized into 36 units (9x4 grid to fit screen)
        for (let i = 0; i < 36; i++) {
            rack.innerHTML += `
                <div class="drum-unit">
                    <div class="drum" id="d-${i}">
                        <div class="active-letter">A</div>
                    </div>
                    <div style="font-size:8px; color:#444; margin-top:2px">B-${i+1}</div>
                </div>`;
        }
    }

    function toggleBombe() {
        if(isRunning) {
            isRunning = false;
            document.getElementById('run-btn').innerText = "START SEARCH";
            return;
        }
        isRunning = true;
        document.getElementById('stop-lamp').classList.remove('hit');
        document.getElementById('run-btn').innerText = "STOPPING...";
        document.getElementById('log').innerHTML = "> SCANNING FOR LOGICAL CONSISTENCY...<br>" + document.getElementById('log').innerHTML;
        scan();
    }

    function scan() {
        if(!isRunning) return;
        const target = document.getElementById('secret-key').value.toUpperCase();
        const currentPos = p.map(x => alpha[x]).join("");
        document.getElementById('odo').innerText = currentPos;

        // Visual update for 36 drums with "Mechanical" Rotation
        for(let i=0; i<36; i++) {
            let d = document.getElementById(`d-${i}`);
            let rotation = p[i % 3] * (360/26);
            d.style.transform = `rotate(${rotation}deg)`;
            d.querySelector('.active-letter').innerText = alpha[p[i%3]];
            d.querySelector('.active-letter').style.transform = `rotate(-${rotation}deg)`;
        }

        // Logic Check: This must match the Secret Key EXACTLY to trigger
        if(currentPos === target) {
            document.getElementById('stop-lamp').classList.add('hit');
            const crib = document.getElementById('crib-in').value;
            document.getElementById('log').innerHTML = `
                <span style="color:yellow">*** VALID CIRCUIT DETECTED AT [${currentPos}] ***</span><br>
                <span style="color:#fff">CRIB "${crib}" VALIDATED AGAINST INTERCEPT.</span><br>
                <span style="color:#00ff41">> DECRYPTION PROTOCOL: SUCCESS</span><br>
            ` + document.getElementById('log').innerHTML;
            isRunning = false;
            document.getElementById('run-btn').innerText = "START SEARCH";
            alert("BOMBE STOPPED: Logical setting confirmed at " + currentPos);
        } else {
            // Mechanical Advance: Right -> Middle -> Left
            p[2]++;
            if(p[2] >= 26) { p[2] = 0; p[1]++; }
            if(p[1] >= 26) { p[1] = 0; p[0]++; }
            if(p[0] >= 26) p[0] = 0;

            setTimeout(scan, 20); 
        }
    }
</script>
</body>
</html>
