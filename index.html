<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bombe Model G: Instructor Edition</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Special+Elite&family=Fira+Code:wght@400&display=swap');
        :root { --bakelite: #1a1a1a; --brass: #b08d57; --rim: #f0f0f0; }
        body { background: #080808; color: #ddd; font-family: 'Special Elite', serif; display: flex; flex-direction: column; align-items: center; padding: 15px; margin: 0; }
        .chassis { background: #1a1a1a; border: 10px solid #000; padding: 20px; width: 95vw; max-width: 1100px; box-shadow: 0 50px 100px #000; }
        
        /* ROTOR RACK */
        .rack { display: grid; grid-template-columns: repeat(12, 1fr); gap: 8px; background: #000; padding: 15px; border: 2px solid #222; margin-bottom: 20px; }
        .drum-unit { display: flex; flex-direction: column; align-items: center; }
        .drum {
            width: 55px; height: 55px; border-radius: 50%;
            background: radial-gradient(circle, #444 0%, #111 60%, #000 100%);
            border: 3px solid #333; position: relative;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: transform 0.1s linear;
        }
        .drum::after {
            content: "A . C . E . G . I . K . M . O . Q . S . U . W . Y .";
            position: absolute; width: 100%; height: 100%; font-size: 7px; color: rgba(255,255,255,0.5);
            display: flex; align-items: center; justify-content: center; text-align: center;
        }
        .active-letter { font-size: 20px; color: #fff; font-weight: bold; z-index: 5; pointer-events: none; }
        .center-hub { width: 12px; height: 12px; background: var(--brass); border-radius: 50%; position: absolute; z-index: 4; border: 1px solid #000; }

        /* PANELS */
        .panel-grid { display: grid; grid-template-columns: 1fr 1.5fr 1fr; gap: 15px; }
        .sub-panel { background: #0f0f0f; border: 1px solid #333; padding: 12px; border-radius: 4px; }
        .label { font-size: 9px; color: #777; text-transform: uppercase; margin-bottom: 5px; }
        input, select { background: #000; color: #00ff41; border: 1px solid #444; padding: 8px; font-family: 'Fira Code'; font-size: 13px; width: 90%; margin-bottom: 10px; }
        .screen { background: #000b00; color: #00ff41; height: 120px; font-family: 'Fira Code'; font-size: 11px; padding: 8px; overflow-y: auto; border: 1px solid #002200; }
        
        button { background: #4a0000; color: white; border: 2px solid #000; padding: 12px; cursor: pointer; font-family: 'Special Elite'; width: 100%; font-size: 16px; }
        .odo { font-size: 32px; color: var(--brass); background: #000; text-align: center; letter-spacing: 5px; margin: 10px 0; border: 1px solid #333; }
        .lamp { width: 30px; height: 30px; border-radius: 50%; background: #200; border: 2px solid #000; margin: 0 auto 5px; }
        .lamp.hit { background: radial-gradient(circle, #f00, #400); box-shadow: 0 0 20px #f00; }

        /* INSTRUCTOR SECTION */
        .instructor-console { margin-top: 25px; width: 95vw; max-width: 1100px; background: #050505; border: 1px dashed #444; padding: 20px; border-radius: 4px; }
    </style>
</head>
<body onload="init()">

    <div class="chassis">
        <h1 class="header">Turing-Welchman Bombe: Logic Bank</h1>
        <div class="rack" id="rack"></div>

        <div class="panel-grid">
            <div class="sub-panel">
                <div class="label">Rotor Order</div>
                <select id="user-rotor-order">
                    <option value="123">I - II - III</option>
                    <option value="425">IV - II - V</option>
                </select>
                <div class="label">Intercepted Cipher</div>
                <input type="text" id="disp-cipher" readonly>
                <div class="label">Crib Guess</div>
                <input type="text" id="disp-crib" readonly>
            </div>

            <div class="sub-panel">
                <div class="label">Logic Monitor</div>
                <div class="screen" id="log">> STANDBY...</div>
                <div style="font-size:8px; color:var(--brass); margin-top:5px">CLICK DRUMS 1-3 TO MANUALLY ADJUST START POSITION</div>
            </div>

            <div class="sub-panel" style="text-align:center;">
                <div class="odo" id="odo">AAA</div>
                <div class="lamp" id="stop-lamp"></div>
                <button onclick="toggleBombe()">RUN MOTOR</button>
            </div>
        </div>
    </div>

    <div class="instructor-console">
        <h3 style="color:#800; margin-top:0;">Instructor Master Console</h3>
        <div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap:20px;">
            <div>
                <div class="label">1. Set Secret Plaintext</div>
                <input type="text" id="secret-msg" value="WEATHERREPORT" oninput="generateProblem()">
                <div class="label">2. Set Secret Start Pos</div>
                <input type="text" id="secret-start" value="DFG" maxlength="3" oninput="generateProblem()">
            </div>
            <div>
                <div class="label">3. Secret Rotor Order</div>
                <select id="secret-order" onchange="generateProblem()">
                    <option value="123">I - II - III</option>
                    <option value="425">IV - II - V</option>
                </select>
            </div>
            <div style="background:#111; padding:10px; border:1px solid #222;">
                <div class="label" style="color:white">Student Tasking</div>
                <div id="student-task" style="font-size:10px; color:#aaa; font-family:'Fira Code';"></div>
            </div>
        </div>
    </div>

<script>
    const alpha = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
    let isRunning = false, p = [0, 0, 0];
    let secretKey = "DFG", secretOrder = "123";

    function init() {
        const rack = document.getElementById('rack');
        for (let i = 0; i < 36; i++) {
            rack.innerHTML += `<div class="drum-unit">
                <div class="drum" id="d-${i}" onclick="manualRotate(${i})"><div class="center-hub"></div><div class="active-letter">A</div></div>
                <div style="font-size:8px; color:#444; margin-top:2px">${i+1}</div></div>`;
        }
        generateProblem();
    }

    function generateProblem() {
        secretKey = document.getElementById('secret-start').value.toUpperCase();
        secretOrder = document.getElementById('secret-order').value;
        const msg = document.getElementById('secret-msg').value.toUpperCase();
        
        // Update display for students
        document.getElementById('disp-cipher').value = "SCRAMBLED_MSG_AUTO"; // Simplified for lab flow
        document.getElementById('disp-crib').value = msg.substring(0, 7);
        document.getElementById('student-task').innerHTML = `GIVE TO STUDENTS:<br>Cipher: [ENCRYPTED]<br>Crib: ${msg.substring(0, 7)}`;
    }

    function manualRotate(idx) {
        if (isRunning || idx > 2) return;
        p[idx] = (p[idx] + 1) % 26;
        updateVisuals();
    }

    function updateVisuals() {
        document.getElementById('odo').innerText = p.map(x => alpha[x]).join("");
        for(let i=0; i<36; i++) {
            let rot = p[i % 3] * (360/26);
            let d = document.getElementById(`d-${i}`);
            d.style.transform = `rotate(${rot}deg)`;
            d.querySelector('.active-letter').innerText = alpha[p[i%3]];
            d.querySelector('.active-letter').style.transform = `rotate(-${rot}deg)`;
        }
    }

    function toggleBombe() {
        isRunning = !isRunning;
        if(isRunning) {
            document.getElementById('stop-lamp').classList.remove('hit');
            scan();
        }
    }

    function scan() {
        if(!isRunning) return;
        const current = p.map(x => alpha[x]).join("");
        const order = document.getElementById('user-rotor-order').value;
        document.getElementById('odo').innerText = current;

        if(current === secretKey && order === secretOrder) {
            document.getElementById('stop-lamp').classList.add('hit');
            document.getElementById('log').innerHTML = `<span style="color:yellow">*** STOP DETECTED AT ${current} ***</span><br>` + document.getElementById('log').innerHTML;
            isRunning = false;
            alert("BOMBE STOPPED: Logical Match Found.");
        } else {
            p[2]++;
            if(p[2] >= 26) { p[2] = 0; p[1]++; }
            if(p[1] >= 26) { p[1] = 0; p[0]++; }
            if(p[0] >= 26) { isRunning = false; alert("Full cycle complete. No match."); }
            updateVisuals();
            setTimeout(scan, 5);
        }
    }
</script>
</body>
</html>
