<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bletchley Park: Bombe Terminal</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Special+Elite&family=Fira+Code:wght@400&display=swap');
        :root { --bakelite: #1a1a1a; --brass: #b08d57; }
        body { background: #080808; color: #ddd; font-family: 'Special Elite', serif; display: flex; flex-direction: column; align-items: center; padding: 15px; margin: 0; }
        .chassis { background: #1a1a1a; border: 10px solid #000; padding: 25px; width: 95vw; max-width: 1100px; box-shadow: 0 50px 100px #000; }
        .header { text-align: center; color: var(--brass); letter-spacing: 4px; border-bottom: 2px solid #333; padding-bottom: 10px; text-transform: uppercase; }

        /* THE DRUMS */
        .rack { display: grid; grid-template-columns: repeat(12, 1fr); gap: 10px; background: #000; padding: 20px; margin-bottom: 25px; border: 2px solid #222; }
        .drum {
            width: 60px; height: 60px; border-radius: 50%;
            background: radial-gradient(circle, #444 0%, #111 60%, #000 100%);
            border: 4px solid #333; position: relative;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: transform 0.1s linear;
        }
        .drum::after {
            content: "A . C . E . G . I . K . M . O . Q . S . U . W . Y .";
            position: absolute; width: 100%; height: 100%; font-size: 7px; color: rgba(255,255,255,0.4);
            display: flex; align-items: center; justify-content: center; text-align: center;
        }
        .active-letter { font-size: 24px; color: #fff; font-weight: bold; z-index: 5; pointer-events: none; }
        .center-hub { width: 14px; height: 14px; background: var(--brass); border-radius: 50%; position: absolute; z-index: 4; border: 1px solid #000; }

        /* PANELS */
        .panel-grid { display: grid; grid-template-columns: 1fr 1.5fr 1fr; gap: 20px; }
        .sub-panel { background: #0f0f0f; border: 1px solid #333; padding: 15px; border-radius: 4px; }
        .label { font-size: 10px; color: #666; text-transform: uppercase; margin-bottom: 8px; }
        input, select { background: #000; color: #00ff41; border: 1px solid #444; padding: 10px; font-family: 'Fira Code'; font-size: 13px; width: 90%; margin-bottom: 12px; }
        .screen { background: #000b00; color: #00ff41; height: 140px; font-family: 'Fira Code'; font-size: 11px; padding: 10px; overflow-y: auto; border: 1px solid #002200; }
        button { background: #4a0000; color: white; border: 3px solid #000; padding: 18px; cursor: pointer; font-family: 'Special Elite'; width: 100%; font-size: 18px; }
        .odo { font-size: 38px; color: var(--brass); background: #000; text-align: center; letter-spacing: 8px; border: 1px solid #333; margin-bottom: 10px; }
        .lamp { width: 40px; height: 40px; border-radius: 50%; background: #200; border: 3px solid #000; margin: 10px auto; }
        .lamp.hit { background: radial-gradient(circle, #f00, #400); box-shadow: 0 0 30px #f00; }
    </style>
</head>
<body onload="init()">

    <div class="chassis">
        <h1 class="header">Bombe Model G: Decryption Terminal</h1>
        <div class="rack" id="rack"></div>

        <div class="panel-grid">
            <div class="sub-panel">
                <div class="label">Hardware Config (Rotors)</div>
                <select id="user-order">
                    <option value="123">I - II - III</option>
                    <option value="425">IV - II - V</option>
                    <option value="135">I - III - V</option>
                </select>
                <div class="label">Intercepted Cipher</div>
                <input type="text" placeholder="PASTE CODE HERE...">
                <div class="label">Crib Guess</div>
                <input type="text" placeholder="WEATHER">
            </div>

            <div class="sub-panel">
                <div class="label">Logic Monitor</div>
                <div class="screen" id="log">> AWAITING SIGNAL...</div>
                <div style="font-size:9px; color:var(--brass); margin-top:10px;">* CLICK DRUMS 1-3 TO SET START POSITION</div>
            </div>

            <div class="sub-panel" style="text-align:center;">
                <div class="odo" id="odo">AAA</div>
                <div class="lamp" id="stop-lamp"></div>
                <button id="run-btn" onclick="toggleBombe()">RUN MOTOR</button>
            </div>
        </div>
    </div>

<script>
    const alpha = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
    let isRunning = false, p = [0, 0, 0];
    
    // HIDDEN LOGIC: Reads from the URL
    const urlParams = new URLSearchParams(window.location.search);
    const TRUE_KEY = (urlParams.get('key') || "DFG").toUpperCase();
    const TRUE_ORDER = urlParams.get('order') || "123";

    function init() {
        const rack = document.getElementById('rack');
        for (let i = 0; i < 36; i++) {
            rack.innerHTML += `<div class="drum-unit"><div class="drum" id="d-${i}" onclick="manualRotate(${i})"><div class="center-hub"></div><div class="active-letter">A</div></div></div>`;
        }
    }

    function manualRotate(idx) {
        if (isRunning || idx > 2) return;
        p[idx] = (p[idx] + 1) % 26;
        updateVisuals();
    }

    function updateVisuals() {
        document.getElementById('odo').innerText = p.map(x => alpha[x]).join("");
        for(let i=0; i<36; i++) {
            let rot = p[i % 3] * (360/26);
            let d = document.getElementById(`d-${i}`);
            d.style.transform = `rotate(${rot}deg)`;
            d.querySelector('.active-letter').innerText = alpha[p[i%3]];
            d.querySelector('.active-letter').style.transform = `rotate(-${rot}deg)`;
        }
    }

    function toggleBombe() {
        isRunning = !isRunning;
        document.getElementById('run-btn').innerText = isRunning ? "STOP MOTOR" : "RUN MOTOR";
        if(isRunning) {
            document.getElementById('stop-lamp').classList.remove('hit');
            scan();
        }
    }

    function scan() {
        if(!isRunning) return;
        const current = p.map(x => alpha[x]).join("");
        const order = document.getElementById('user-order').value;
        document.getElementById('odo').innerText = current;

        if(current === TRUE_KEY && order === TRUE_ORDER) {
            document.getElementById('stop-lamp').classList.add('hit');
            document.getElementById('log').innerHTML = `<span style="color:yellow">*** HIT DETECTED AT ${current} ***</span><br>` + document.getElementById('log').innerHTML;
            isRunning = false;
            document.getElementById('run-btn').innerText = "RUN MOTOR";
        } else {
            p[2]++;
            if(p[2] >= 26) { p[2] = 0; p[1]++; }
            if(p[1] >= 26) { p[1] = 0; p[0]++; }
            if(p[0] >= 26) { 
                isRunning = false; 
                document.getElementById('log').innerHTML = "<span style='color:red'>> FULL CYCLE: NO MATCH.</span><br>";
                return; 
            }
            updateVisuals();
            setTimeout(scan, 10);
        }
    }
</script>
</body>
</html>
