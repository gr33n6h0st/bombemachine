<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bombe Re-Construction: Mechanical Logic Bank</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Special+Elite&family=Fira+Code:wght@400&display=swap');
        
        :root { --bakelite: #0d0d0d; --brass: #c5a059; --glow: #00ff41; }

        body { background: #050505; color: #ddd; font-family: 'Special Elite', serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        
        .chassis { 
            background: #111; border: 4px solid #333; padding: 30px; width: 95vw; max-width: 1100px;
            box-shadow: 0 0 100px #000; position: relative;
        }

        .header { 
            text-align: center; color: var(--brass); letter-spacing: 5px; 
            border-bottom: 1px solid #333; padding-bottom: 15px; margin-bottom: 25px;
        }

        /* THE DRUMS FROM YOUR SCREENSHOT */
        .rack { 
            display: grid; grid-template-columns: repeat(12, 1fr); gap: 15px; 
            background: #000; padding: 25px; border: 2px solid #222; margin-bottom: 30px;
        }

        .drum {
            width: 65px; height: 65px; border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #333 0%, #000 80%);
            border: 2px solid #222; position: relative;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 8px #000; cursor: pointer;
        }

        .drum::before {
            content: "A..D G..J ..M.. ..S.. ..V..Y..";
            position: absolute; width: 100%; height: 100%; font-size: 7px;
            color: rgba(255,255,255,0.2); text-align: center; display: flex; align-items: center; justify-content: center;
        }

        .active-letter { font-size: 28px; color: #fff; font-weight: bold; z-index: 5; text-shadow: 0 0 5px #fff; }

        /* THE CONTROL PANELS */
        .panel-grid { display: grid; grid-template-columns: 1fr 1.5fr 1fr; gap: 20px; }
        .sub-panel { background: #0a0a0a; border: 1px solid #222; padding: 20px; border-radius: 4px; }
        .label { font-size: 10px; color: #555; text-transform: uppercase; margin-bottom: 8px; }
        
        input { 
            background: #000; color: var(--glow); border: 1px solid #333; 
            padding: 12px; font-family: 'Fira Code'; font-size: 14px; width: 90%; 
            margin-bottom: 15px; text-transform: uppercase;
        }

        .screen { 
            background: #000b00; color: var(--glow); height: 150px; 
            padding: 15px; border: 1px solid #003300; font-family: 'Fira Code'; font-size: 12px;
            overflow-y: auto; line-height: 1.4;
        }

        .odo { 
            font-size: 45px; color: var(--brass); background: #000; 
            text-align: center; letter-spacing: 15px; border: 1px solid #222; margin-bottom: 15px;
        }

        button { 
            background: #4a0000; color: #fff; border: 2px solid #000; 
            padding: 20px; width: 100%; cursor: pointer; font-size: 20px;
        }

        .lamp { width: 45px; height: 45px; border-radius: 50%; background: #200; border: 3px solid #000; margin: 15px auto; }
        .lamp.hit { background: radial-gradient(circle, #f00, #400); box-shadow: 0 0 40px #f00; }
    </style>
</head>
<body onload="init()">

    <div class="chassis">
        <h1 class="header">Bombe Re-Construction: Mechanical Logic Bank</h1>
        <div class="rack" id="rack"></div>

        <div class="panel-grid">
            <div class="sub-panel">
                <div class="label">Incoming Intercept</div>
                <input type="text" id="cipher-in" placeholder="LVBHTYAIGY">
                <div class="label">English Crib (Guess)</div>
                <input type="text" id="crib-in" placeholder="WORLD">
            </div>

            <div class="sub-panel">
                <div class="label">Logical Contradiction Trace</div>
                <div class="screen" id="log">> STANDBY: AWAITING INTERCEPT...</div>
            </div>

            <div class="sub-panel" style="text-align:center;">
                <div class="odo" id="odo">AAA</div>
                <div class="lamp" id="stop-lamp"></div>
                <button id="run-btn" onclick="toggleBombe()">RUN MOTOR</button>
            </div>
        </div>
    </div>

<script>
    const alpha = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
    let isRunning = false, p = [0, 0, 0];
    
    // AUTHENTIC WEHRMACHT I-II-III WIRING
    const rotors = ["EKMFLGDQVZNTOWYHXUSPAIBRCJ", "AJDKSIRUXBLHWTMCQGZNPYFVOE", "BDFHJLCPRTXVZNYEIWGAKMUSQO"];
    const reflector = "YRUHQSLDPXNGOKMIEBFZCWVJAT";

    function init() {
        const rack = document.getElementById('rack');
        for (let i = 0; i < 36; i++) {
            rack.innerHTML += `<div class="drum" id="d-${i}" onclick="manualSet(${i%3})"><div class="active-letter">A</div></div>`;
        }
        updateVisuals();
    }

    function manualSet(idx) { if(!isRunning) { p[idx] = (p[idx] + 1) % 26; updateVisuals(); } }

    function enigmaMap(char, pos) {
        let c = alpha.indexOf(char);
        // Forward through rotors (III -> II -> I)
        for(let i=2; i>=0; i--) {
            c = (alpha.indexOf(rotors[i][(c + pos[i] + 26) % 26]) - pos[i] + 26) % 26;
        }
        // Reflector
        c = alpha.indexOf(reflector[c]);
        // Reverse through rotors (I -> II -> III)
        for(let i=0; i<3; i++) {
            let target = alpha[(c + p[i] + 26) % 26];
            c = (rotors[i].indexOf(target) - p[i] + 26) % 26;
        }
        return alpha[c];
    }

    function toggleBombe() {
        isRunning = !isRunning;
        document.getElementById('run-btn').innerText = isRunning ? "STOP MOTOR" : "RUN MOTOR";
        if(isRunning) {
            document.getElementById('stop-lamp').classList.remove('hit');
            document.getElementById('log').innerHTML = "> MOTOR START... SEARCHING<br>" + document.getElementById('log').innerHTML;
            scan();
        }
    }

    function scan() {
        if(!isRunning) return;
        const cipher = document.getElementById('cipher-in').value.toUpperCase().replace(/[^A-Z]/g, "");
        const crib = document.getElementById('crib-in').value.toUpperCase().replace(/[^A-Z]/g, "");
        if(!cipher || !crib) { isRunning = false; return; }

        let matchFound = false;
        // SMART SEARCH: The "Sliding Window" - checks if the crib starts at position 0, 1, 2, etc.
        for (let offset = 0; offset < Math.min(cipher.length - crib.length + 1, 15); offset++) {
            let testPassed = true;
            for(let i = 0; i < crib.length; i++) {
                let stepPos = [...p];
                stepPos[2] = (stepPos[2] + offset + i) % 26; // Simulate Enigma Stepping
                if(enigmaMap(crib[i], stepPos) !== cipher[offset + i]) {
                    testPassed = false; break;
                }
            }
            if(testPassed) { matchFound = true; break; }
        }

        if(matchFound) {
            document.getElementById('stop-lamp').classList.add('hit');
            document.getElementById('log').innerHTML = `<span style="color:yellow">*** HIT FOUND AT POSITION ${p.map(x=>alpha[x]).join("")} ***</span><br>> LOGIC CONSISTENT FOR CRIB: ${crib}<br>` + document.getElementById('log').innerHTML;
            isRunning = false;
        } else {
            p[2]++;
            if(p[2] >= 26) { p[2] = 0; p[1]++; }
            if(p[1] >= 26) { p[1] = 0; p[0]++; }
            if(p[0] >= 26) { isRunning = false; return; }
            updateVisuals();
            setTimeout(scan, 1);
        }
    }

    function updateVisuals() {
        document.getElementById('odo').innerText = p.map(x => alpha[x]).join("");
        for(let i=0; i<36; i++) {
            let d = document.getElementById(`d-${i}`);
            let rot = p[i%3] * (360/26);
            d.style.transform = `rotate(${rot}deg)`;
            d.querySelector('.active-letter').innerText = alpha[p[i%3]];
            d.querySelector('.active-letter').style.transform = `rotate(-${rot}deg)`;
        }
    }
</script>
</body>
</html>
