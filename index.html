<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bombe: Mechanical Trial & Error</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Special+Elite&family=Fira+Code:wght@400&display=swap');
        :root { --bakelite: #1a1a1a; --brass: #b08d57; --rim: #f0f0f0; }
        body { background: #0a0a0a; color: #ddd; font-family: 'Special Elite', serif; display: flex; flex-direction: column; align-items: center; padding: 15px; margin: 0; }
        
        .chassis { background: #1a1a1a; border: 10px solid #000; padding: 25px; width: 95vw; max-width: 1100px; box-shadow: 0 50px 100px #000; }
        .header { text-align: center; color: var(--brass); letter-spacing: 4px; margin-bottom: 20px; border-bottom: 2px solid #333; padding-bottom: 10px; }

        /* THE DRUMS - High Contrast Skeuomorphic */
        .rack { display: grid; grid-template-columns: repeat(12, 1fr); gap: 10px; background: #000; padding: 20px; margin-bottom: 20px; border: 2px solid #222; overflow: hidden; }
        .drum-unit { display: flex; flex-direction: column; align-items: center; }
        .drum {
            width: 60px; height: 60px; border-radius: 50%;
            background: radial-gradient(circle, #333 0%, #111 60%, #000 100%);
            border: 4px solid #222; position: relative;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 10px #000; transition: transform 0.05s linear;
        }
        /* Alphabet Ring Marks */
        .drum::after {
            content: "A . . D . . G . . J . . M . . P . . S . . V . . Y .";
            position: absolute; width: 100%; height: 100%; font-size: 8px; color: rgba(255,255,255,0.5);
            display: flex; align-items: center; justify-content: center; text-align: center;
        }
        .drum-letter { font-size: 24px; color: #fff; font-weight: bold; z-index: 5; text-shadow: 0 0 5px #000; }

        .panel-grid { display: grid; grid-template-columns: 1.2fr 1.5fr 1fr; gap: 20px; }
        .sub-panel { background: #0f0f0f; border: 1px solid #333; padding: 15px; border-radius: 4px; }
        .label { font-size: 11px; color: #666; text-transform: uppercase; margin-bottom: 8px; }
        
        input, select { background: #000; color: #00ff41; border: 1px solid #444; padding: 10px; font-family: 'Fira Code'; font-size: 14px; width: 90%; margin-bottom: 15px; }
        
        .screen { background: #000b00; color: #00ff41; height: 160px; font-family: 'Fira Code'; font-size: 11px; padding: 10px; overflow-y: auto; border: 1px solid #002200; line-height: 1.5; }
        
        button { background: #4a0000; color: white; border: 3px solid #000; padding: 18px; cursor: pointer; font-family: 'Special Elite'; font-weight: bold; font-size: 18px; width: 100%; box-shadow: 0 5px 0 #222; }
        button:active { transform: translateY(3px); box-shadow: 0 2px 0 #222; }

        .lamp { width: 40px; height: 40px; border-radius: 50%; background: #200; border: 3px solid #000; margin: 15px auto; }
        .lamp.hit { background: radial-gradient(circle, #f00, #400); box-shadow: 0 0 30px #f00; border-color: #ffcccc; }
        .odo { font-size: 40px; color: var(--brass); background: #000; padding: 10px; border: 1px solid #333; text-align: center; margin: 10px 0; letter-spacing: 8px; border-radius: 4px; }
    </style>
</head>
<body onload="init()">

    <div class="chassis">
        <h1 class="header">Bombe Re-Construction: Mechanical Logic Bank</h1>
        <div class="rack" id="rack"></div>

        <div class="panel-grid">
            <div class="sub-panel">
                <div class="label">1. Set Rotor Order (Your Guess)</div>
                <select id="rotor-order">
                    <option value="123">I - II - III</option>
                    <option value="425">IV - II - V</option>
                    <option value="135">I - III - V</option>
                </select>

                <div class="label">2. Ciphertext Intercept</div>
                <input type="text" id="cipher-in" value="LVBHTYAIGY">

                <div class="label">3. Target Crib</div>
                <input type="text" id="crib-in" value="WORLD">
            </div>

            <div class="sub-panel">
                <div class="label">Logic Monitor</div>
                <div class="screen" id="log">> STANDBY: AWAITING ROTOR CONFIGURATION...</div>
            </div>

            <div class="sub-panel" style="text-align:center;">
                <button id="run-btn" onclick="toggleBombe()">RUN MOTOR</button>
                <div class="odo" id="odo">AAA</div>
                <div class="lamp" id="stop-lamp"></div>
                <div class="label">STOP INDICATOR</div>
            </div>
        </div>
    </div>

<script>
    const alpha = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
    let isRunning = false, p = [0, 0, 0];
    
    // THE "TRUTH" (What the Enigma actually used)
    const ACTUAL_ROTOR_ORDER = "425"; 
    const ACTUAL_SETTING = "DPG";

    function init() {
        const rack = document.getElementById('rack');
        for (let i = 0; i < 36; i++) {
            rack.innerHTML += `
                <div class="drum-unit">
                    <div class="drum" id="d-${i}"><div class="drum-letter">A</div></div>
                    <div style="font-size:9px; color:#444; margin-top:5px">${i+1}</div>
                </div>`;
        }
    }

    function toggleBombe() {
        isRunning = !isRunning;
        const btn = document.getElementById('run-btn');
        btn.innerText = isRunning ? "STOP MOTOR" : "RUN MOTOR";
        if(isRunning) {
            document.getElementById('stop-lamp').classList.remove('hit');
            document.getElementById('log').innerHTML = "> MOTOR ENGAGED. TESTING PERMUTATIONS...<br>" + document.getElementById('log').innerHTML;
            scan();
        }
    }

    function scan() {
        if(!isRunning) return;
        
        const userRotorGuess = document.getElementById('rotor-order').value;
        const currentPos = p.map(x => alpha[x]).join("");
        document.getElementById('odo').innerText = currentPos;

        // Visual Rotation
        for(let i=0; i<36; i++) {
            let d = document.getElementById(`d-${i}`);
            let rot = p[i % 3] * (360/26);
            d.style.transform = `rotate(${rot}deg)`;
            d.querySelector('.drum-letter').style.transform = `rotate(-${rot}deg)`;
            d.querySelector('.drum-letter').innerText = alpha[p[i%3]];
        }

        // TRIAL AND ERROR LOGIC:
        // 1. Is the Rotor Order correct?
        // 2. Is the Odometer at the right position?
        if(userRotorGuess === ACTUAL_ROTOR_ORDER && currentPos === ACTUAL_SETTING) {
            foundHit(currentPos);
        } else {
            // Mechanical Advance
            p[2]++;
            if(p[2] >= 26) { p[2] = 0; p[1]++; }
            if(p[1] >= 26) { p[1] = 0; p[0]++; }
            
            // If we complete a full loop (17,576) without a hit
            if(p[0] >= 26) {
                p = [0,0,0];
                isRunning = false;
                document.getElementById('log').innerHTML = "<span style='color:red'>> ERROR: FULL CYCLE COMPLETE. NO VALID CONTRADICTION FOUND. CHECK ROTOR ORDER.</span><br>" + document.getElementById('log').innerHTML;
                document.getElementById('run-btn').innerText = "RUN MOTOR";
                return;
            }
            setTimeout(scan, 10); // Speed set for "Mechanical" feel
        }
    }

    function foundHit(pos) {
        isRunning = false;
        document.getElementById('stop-lamp').classList.add('hit');
        document.getElementById('run-btn').innerText = "RUN MOTOR";
        document.getElementById('log').innerHTML = `
            <span style="color:yellow">*** LOGICAL HIT DETECTED AT ${pos} ***</span><br>
            <span style="color:#fff">ROTOR CONFIGURATION VALIDATED.</span><br>
            <span style="color:#00ff41">> DECRYPTED: SUCCESSFUL MATCH</span><br>
        ` + document.getElementById('log').innerHTML;
        alert("BOMBE STOP: Logical match found at " + pos);
    }
</script>
</body>
</html>
