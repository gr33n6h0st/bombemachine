<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>The Bombe: Ultra High-Speed Decryptor</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Special+Elite&family=Fira+Code:wght@400&display=swap');
        body { background: #050505; color: #ccc; font-family: 'Special Elite', serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .bombe-frame { background: linear-gradient(145deg, #2a2a2a, #0a0a0a); border: 10px solid #000; padding: 30px; width: 900px; box-shadow: 0 50px 100px #000; }
        .drum-grid { display: grid; grid-template-columns: repeat(12, 1fr); gap: 12px; margin-bottom: 30px; background: rgba(0,0,0,0.3); padding: 15px; border: 1px solid #333; }
        .drum { width: 55px; height: 55px; border-radius: 50%; background: conic-gradient(#444, #d1d1d1, #444, #d1d1d1, #444); border: 4px solid #1a1a1a; display: flex; align-items: center; justify-content: center; font-weight: bold; color: #b08d57; box-shadow: 0 4px 8px #000; }
        .spinning { animation: drumSpin 0.3s linear infinite; }
        @keyframes drumSpin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .control-panel { display: grid; grid-template-columns: 1fr 2fr 1fr; gap: 20px; }
        .panel-box { background: #111; border: 2px solid #333; padding: 15px; }
        .screen { background: #001a00; color: #00ff41; height: 180px; font-family: 'Fira Code'; font-size: 11px; padding: 10px; overflow-y: auto; border: 1px solid #003300; }
        .lamp { width: 25px; height: 25px; border-radius: 50%; background: #200; border: 2px solid #000; margin: 10px auto; }
        .lamp.hit { background: radial-gradient(circle, #f00, #400); box-shadow: 0 0 20px #f00; border-color: #f66; }
        input { background: #000; color: #b08d57; border: 1px solid #b08d57; width: 90%; padding: 5px; font-family: 'Special Elite'; margin-top: 10px; }
        button { background: #4a0000; color: #fff; width: 100%; padding: 15px; border: 3px solid #000; cursor: pointer; font-family: 'Special Elite'; margin-top: 10px; }
    </style>
</head>
<body onload="init()">
    <div class="bombe-frame">
        <h1 style="text-align:center; color:#b08d57; margin-top:0">BOMBE ENCLOSURE: MODEL G</h1>
        <div class="drum-grid" id="rack"></div>
        <div class="control-panel">
            <div class="panel-box">
                <div style="font-size:10px">TARGET CRIB</div>
                <input type="text" id="crib" value="WETTER">
                <div class="lamp" id="stop-lamp"></div>
                <div style="text-align:center; font-size:10px">STOP INDICATOR</div>
            </div>
            <div class="panel-box">
                <div class="screen" id="log">> READY TO SCAN...</div>
            </div>
            <div class="panel-box">
                <button id="run-btn" onclick="toggleBombe()">RUN MOTOR</button>
                <div style="margin-top:20px; font-size:14px; text-align:center">
                    POS: <span id="pos-display" style="color:#b08d57">AAA</span>
                </div>
            </div>
        </div>
    </div>
<script>
    const alpha = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
    let isRunning = false, p = [0,0,0], target = "AAA"; // This is what it searches for
    function init() {
        const r = document.getElementById('rack');
        for(let i=0; i<36; i++) r.innerHTML += `<div class="drum" id="d-${i}">A</div>`;
    }
    function toggleBombe() {
        isRunning = !isRunning;
        const btn = document.getElementById('run-btn');
        btn.innerText = isRunning ? "STOPPING..." : "RUN MOTOR";
        btn.style.background = isRunning ? "#222" : "#4a0000";
        if(isRunning) {
            document.querySelectorAll('.drum').forEach(d => d.classList.add('spinning'));
            document.getElementById('stop-lamp').classList.remove('hit');
            scan();
        } else {
            document.querySelectorAll('.drum').forEach(d => d.classList.remove('spinning'));
        }
    }
    function scan() {
        if(!isRunning) return;
        p[2]++;
        if(p[2]>=26){ p[2]=0; p[1]++; }
        if(p[1]>=26){ p[1]=0; p[0]++; }
        const pos = alpha[p[0]] + alpha[p[1]] + alpha[p[2]];
        document.getElementById('pos-display').innerText = pos;
        const log = document.getElementById('log');
        
        // Logical matching
        if(pos === target) {
            log.innerHTML = `<span style="color:yellow">*** VALID CHAIN FOUND AT ${pos} ***</span><br>` + log.innerHTML;
            document.getElementById('stop-lamp').classList.add('hit');
            toggleBombe();
            alert("BOMBE STOP: Settings confirmed at " + pos);
        } else {
            log.innerHTML = `> TESTING ${pos}: CONTRADICTION<br>` + log.innerHTML;
            if(log.childNodes.length > 20) log.innerHTML = log.innerHTML.split('<br>').slice(0,20).join('<br>');
            setTimeout(scan, 20);
        }
    }
</script>
</body>
</html>
